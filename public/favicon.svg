<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Neon gradient -->
    <linearGradient id="sGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF"></stop>
      <stop offset="50%" stop-color="#00BFFF"></stop>
      <stop offset="100%" stop-color="#7C3AED"></stop>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <!-- Background glow -->
    <radialGradient id="bgGlow">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0.25"></stop>
      <stop offset="100%" stop-color="#00BFFF" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <!-- Transparent background -->
  <circle cx="256" cy="256" r="180" fill="url(#bgGlow)"></circle>

  <!-- Glowing S -->
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Poppins, Arial, sans-serif" font-size="260" font-weight="800" fill="url(#sGradient)" filter="url(#glow)">
    S
  </text>
</svg>